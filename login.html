<!DOCTYPE html>
<html>
<head>
    <title>SecureBank - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <h1>Login</h1>

    <!-- Navigation -->
    <nav class="box-nav">
        <a href="{{ url_for('home') }}" class="nav-home">Home</a>
        <a href="{{ url_for('register') }}" class="nav-register">Register</a>
    </nav>

    <!-- Error Message -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- Login Form -->
    <div class="card">
        <form method="post">

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <input type="submit" value="Login" class="black-btn">

        </form>
    </div>

    <!-- Footer -->
    <footer style="text-align:center; margin-top:20px; font-size:14px; color:#777;">
        © 2026 SecureBank
    </footer>

</div>

</body>
</html>

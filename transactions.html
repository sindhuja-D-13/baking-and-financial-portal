<!DOCTYPE html>
<html>
<head>
    <title>SecureBank - Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <h1>Transaction History</h1>

    <!-- Navigation -->
    <nav class="box-nav">
        <a href="{{ url_for('home') }}" class="nav-home">Home</a>
        <a href="{{ url_for('accounts') }}" class="nav-accounts">Accounts</a>
        <a href="{{ url_for('transactions') }}" class="nav-transactions">Transactions</a>
        <a href="{{ url_for('loans') }}" class="nav-loans">Loans</a>
    </nav>

    <!-- Transactions Table -->
    <div class="card">
        <h2>Recent Transactions</h2>

        <table>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount ($)</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>01-Feb-2026</td>
                <td>ATM Withdrawal</td>
                <td>Debit</td>
                <td>200</td>
                <td>Completed</td>
            </tr>

            <tr>
                <td>03-Feb-2026</td>
                <td>Online Transfer</td>
                <td>Debit</td>
                <td>500</td>
                <td>Completed</td>
            </tr>

            <tr>
                <td>05-Feb-2026</td>
                <td>Salary Credit</td>
                <td>Credit</td>
                <td>3000</td>
                <td>Completed</td>
            </tr>
        </table>
    </div>

    <!-- Actions -->
    <div class="card">
        <h2>Quick Actions</h2>
        <button class="black-btn">Download Statement</button>
        <button class="black-btn">Make Transfer</button>
    </div>

    <!-- Footer -->
    <footer style="text-align:center; margin-top:20px; font-size:14px; color:#777;">
        © 2026 SecureBank
    </footer>

</div>

</body>
</html>

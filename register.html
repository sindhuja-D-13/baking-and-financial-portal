<!DOCTYPE html>
<html>
<head>
    <title>SecureBank - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <!-- Navigation -->
    <nav class="box-nav">
        <a href="{{ url_for('home') }}" class="nav-home">Home</a>
        <a href="{{ url_for('login') }}" class="nav-register">Login</a>
    </nav>

    <!-- Messages -->
    {% if success %}
        <p class="success">{{ success }}</p>
    {% elif error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- Form -->
    <div class="card">
        <form method="post">

            <label>Full Name</label>
            <input type="text" name="fullname" placeholder="Enter full name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>

            <label>Phone</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>

            <label>Account Type</label>
            <select name="account_type" required>
                <option value="">-- Select Account Type --</option>
                <option value="savings">Savings</option>
                <option value="current">Current</option>
                <option value="business">Business</option>
            </select>

            <input type="submit" value="Register" class="black-btn">

        </form>
    </div>

    <!-- Footer -->
    <footer style="text-align:center; margin-top:20px; font-size:14px; color:#777;">
        © 2026 SecureBank
    </footer>

</div>

</body>
</html>

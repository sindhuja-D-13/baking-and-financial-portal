<!DOCTYPE html>
<html>
<head>
    <title>SecureBank - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <h1>Dashboard</h1>

    <!-- Navigation -->
    <nav class="box-nav">
        <a href="{{ url_for('home') }}" class="nav-home">Home</a>
        <a href="{{ url_for('accounts') }}" class="nav-accounts">Accounts</a>
        <a href="{{ url_for('transactions') }}" class="nav-transactions">Transactions</a>
        <a href="{{ url_for('loans') }}" class="nav-loans">Loans</a>
    </nav>

    <!-- Welcome -->
    <div class="card">
        <h2>Welcome to SecureBank</h2>
        <p>
            Manage your banking services easily. Check accounts, view transactions,
            and apply for loans from one place.
        </p>
    </div>

    <!-- Dashboard Cards -->
    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:15px;">

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <h3>Total Balance</h3>
            <p style="font-size:20px; font-weight:bold;">$0.00</p>
        </div>

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <h3>Accounts</h3>
            <p style="font-size:20px; font-weight:bold;">1</p>
        </div>

        <div class="card" style="flex:1; min-width:200px; text-align:center;">
            <h3>Loans</h3>
            <p style="font-size:20px; font-weight:bold;">0</p>
        </div>

    </div>

    <!-- Quick Actions -->
    <div class="card">
        <h2>Quick Actions</h2>
        <button class="black-btn" onclick="location.href='{{ url_for('accounts') }}'">View Accounts</button>
        <button class="black-btn" onclick="location.href='{{ url_for('transactions') }}'">View Transactions</button>
        <button class="black-btn" onclick="location.href='{{ url_for('loans') }}'">Apply Loan</button>
    </div>

    <!-- Footer -->
    <footer style="text-align:center; margin-top:20px; font-size:14px; color:#777;">
        © 2026 SecureBank
    </footer>

</div>

</body>
</html>
